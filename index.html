<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appleBlue: '#0071E3',
                        appleBlueHover: '#005bb5',
                        appleGray: '#F5F5F7',
                        appleDark: '#1D1D1F',
                        appleLightText: '#86868B',
                        appleRed: '#FF3B30',
                        appleGreen: '#34C759'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0,0,0,0.06)',
                        'apple-lg': '0 10px 40px rgba(0,0,0,0.08)'
                    }
                }
            }
        }
    </script>
    <style>
        /* Animaciones y estilos premium */
        body {
            background-color: #F5F5F7;
            color: #1D1D1F;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .input-apple {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            background-color: #ffffff;
            border: 1px solid transparent;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .input-apple:focus {
            outline: none;
            border-color: #0071E3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        .btn-apple {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 1rem 1.5rem;
            border-radius: 999px; /* Pill shape */
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background-color: #0071E3;
            color: white;
        }

        .btn-primary:hover {
            background-color: #005bb5;
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: rgba(0,0,0,0.05);
            color: #1D1D1F;
        }

        .btn-secondary:hover {
            background-color: rgba(0,0,0,0.08);
        }

        /* Modal Animations */
        .modal-enter {
            animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .modal-content-enter {
            animation: modalScaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .modal-exit {
            animation: modalFadeOut 0.2s ease-in forwards;
        }
        
        .modal-content-exit {
            animation: modalScaleDown 0.2s ease-in forwards;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalScaleUp {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes modalScaleDown {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(0.95) translateY(10px); }
        }

        /* Toast Animations */
        .toast-enter {
            animation: toastSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .toast-exit {
            animation: toastSlideDown 0.3s ease-in forwards;
        }

        @keyframes toastSlideUp {
            from { opacity: 0; transform: translateY(100%) translateX(-50%); }
            to { opacity: 1; transform: translateY(0) translateX(-50%); }
        }
        @keyframes toastSlideDown {
            from { opacity: 1; transform: translateY(0) translateX(-50%); }
            to { opacity: 0; transform: translateY(100%) translateX(-50%); }
        }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>

        // --- INICIALIZACIÓN ---
        async function init() {
            let authExitoso = false;

            // Intentar Autenticación Firebase
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                        authExitoso = true;
                    } catch (tokenError) {
                        await signInAnonymously(auth);
                        authExitoso = true;
                    }
                } else {
                    await signInAnonymously(auth);
                    authExitoso = true;
                }
            } catch (error) {
                console.warn("Firebase Auth no activado. Como tus reglas de Firestore son públicas, nos conectaremos sin autenticación.", error);
            }

            // Flujo normal si Firebase autentica bien
            onAuthStateChanged(auth, (user) => {
                firestoreUser = user;
                if (user && authExitoso) {
                    setupRealtimeDb();
                }
            });

            // Flujo si Auth falla (debido a que "Anónimo" no está habilitado en tu consola)
            // Se conectará a la BD de todas formas porque tus reglas 'allow read, write' lo permiten.
            if (!authExitoso) {
                setupRealtimeDb();
            }
        }

        function iniciarModoLocal() {
            const savedDb = localStorage.getItem('libreta_fiados_db');
            if (savedDb) {
                db = JSON.parse(savedDb);
            } else {
                db = { users: [], products: [...MOCK_PRODUCTS] };
            }
            populateProducts();
            renderHome();
        }

        function setupRealtimeDb() {
            const docRef = doc(db_firestore, 'artifacts', appId, 'public', 'data', 'storeData', 'mainData');
            
            onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    db = snapshot.data();
                    if (!db.users) db.users = [];
                    if (!db.products || db.products.length === 0) {
                        db.products = [...MOCK_PRODUCTS];
                        saveDb();
                    }
                    // Sincronizar copia local como respaldo
                    localStorage.setItem('libreta_fiados_db', JSON.stringify(db));
                } else {
                    // El documento en la nube no existe.
                    // Rescatar datos locales primero para NO sobreescribir con datos vacíos
                    const savedDb = localStorage.getItem('libreta_fiados_db');
                    if (savedDb) {
                        db = JSON.parse(savedDb);
                    } else {
                        db = { users: [], products: [...MOCK_PRODUCTS] };
                    }
                    saveDb(); // Subir los datos rescatados a la nube
                }

                // Sincronizar UI
                populateProducts();
                
                // Mantener la vista activa actualizada
                if (!document.getElementById('view-admin').classList.contains('hidden')) {
                    if (document.getElementById('admin-content-cobranza').classList.contains('hidden')) {
                        renderAdminProductos();
                    } else {
                        renderAdminCobranza();
                    }
                } else if (!document.getElementById('view-dashboard').classList.contains('hidden') && currentUser) {
                    const updatedUser = db.users.find(u => u.id === currentUser.id);
                    if (updatedUser) {
                        currentUser = updatedUser;
                        renderDashboard();
                    } else {
                        goBackHome();
                    }
                } else {
                    renderHome();
                }
            }, (error) => {
                console.error("Error al sincronizar datos:", error);
                showToast('Error de conexión con la nube', 'error');
                iniciarModoLocal(); // Respaldo si se pierde la conexión
            });
        }

        async function saveDb() {
            // 1. Guardar localmente SIEMPRE como respaldo
            localStorage.setItem('libreta_fiados_db', JSON.stringify(db));

            // 2. Intentar guardar en Firebase directamente (eliminamos el requisito de auth)
            try {
                const docRef = doc(db_firestore, 'artifacts', appId, 'public', 'data', 'storeData', 'mainData');
                await setDoc(docRef, db);
            } catch (e) {
                console.error("Error guardando datos en Firebase", e);
                showToast('La nube bloqueó el guardado.', 'error');
            }
        }

            const container = document.getElementById('toast-container');

            const icon = isSuccess 
                ? `<svg class="w-5 h-5 text-appleGreen mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg class="w-5 h-5 text-appleRed mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;

            toast.className = `glass px-5 py-3 rounded-full shadow-apple-lg flex items-center mb-3 toast-enter pointer-events-auto`;
            toast.innerHTML = `${icon} <span class="font-medium text-sm text-appleDark">${message}</span>`;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                toast.addEventListener('animationend', () => toast.remove());

            overlay.classList.add('modal-enter');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex', 'modal-content-enter');
            
            activeModal = modal;
            
            // Clean forms on open
            if(modalId === 'modal-register') document.getElementById('form-register').reset();
            if(modalId === 'modal-add-product') {
                document.getElementById('form-add-product').reset();
                // Limpiamos el carrito al abrir

            }
            if(modalId === 'modal-admin-auth') document.getElementById('form-admin-auth').reset();
            if(modalId === 'modal-admin-abono') document.getElementById('form-admin-abono').reset();
        }

        function closeModal() {
            if (!activeModal) return;
            
            const overlay = document.getElementById('modal-overlay');
            const modal = activeModal;
            
            overlay.classList.replace('modal-enter', 'modal-exit');
            modal.classList.replace('modal-content-enter', 'modal-content-exit');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('modal-exit');
                
                modal.classList.add('hidden');
                modal.classList.remove('flex', 'modal-content-exit');
                activeModal = null;
            }, 250); // Match CSS animation duration
        }

        function handleConfirmPurchase(e) {
            e.preventDefault();
            
            if (!currentUser) return; // Paranoia check

            if (currentCart.length === 0) {
                showToast('Agrega al menos un producto a la lista usando el botón "+"', 'error');
                return;
            }

            const enteredPin = document.getElementById('prod-pin').value;

            if (enteredPin !== currentUser.pin) {
                showToast('NIP de autorización incorrecto', 'error');
                return;
            }

            const now = new Date();
            let totalAmount = 0;
            const addedCount = currentCart.length;

            // Actualizar usuario en DB
            const userIndex = db.users.findIndex(u => u.id === currentUser.id);
            if(userIndex !== -1) {
                // Registrar cada producto como una transacción individual en la lista
                currentCart.forEach((item, index) => {
                    const txTime = new Date(now.getTime() + index).toISOString(); // para evitar ids duplicados si son en el mismo milisegundo
                    const tx = {
                        id: Date.now().toString() + '-' + index,
                        productId: item.id,
                        productName: item.name,
                        icon: item.icon,
                        amount: item.price,
                        type: 'cargo',
                        date: txTime
                    };
                    db.users[userIndex].transactions.push(tx);
                    totalAmount += item.price;
                });

                db.users[userIndex].balance += totalAmount;
                
                // Actualizar currentUser ref
                currentUser = db.users[userIndex];
                saveDb();

                closeModal();
                showToast(`${addedCount} producto(s) agregados exitosamente`);
                renderDashboard();
            }
        }

                if (amount > user.balance) {
                    showToast('El abono es mayor a la deuda', 'error');
                    return;

                const tx = {
                    id: Date.now().toString(),
                    productId: 'abono',
                    productName: 'Abono en efectivo',
                    icon: '💵',
                    amount: amount,
                    type: 'abono',
                    date: new Date().toISOString()

                user.balance -= amount;

                closeModal();
                showToast(`Abono de ${formatMoney(amount)} aplicado`);
                renderAdminCobranza();

                    document.getElementById('edit-prod-id').value = product.id;
                    document.getElementById('edit-prod-icon').value = product.icon;
                    document.getElementById('edit-prod-name').value = product.name;
                    document.getElementById('edit-prod-price').value = product.price;
                    btnDelete.classList.remove('hidden');
                }
            } else {
                title.innerText = 'Nuevo Producto';
                document.getElementById('edit-prod-id').value = '';
                btnDelete.classList.add('hidden');
            }
            openModal('modal-admin-product');
        }

        function handleSaveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('edit-prod-id').value;
            const icon = document.getElementById('edit-prod-icon').value || '📦';
            const name = document.getElementById('edit-prod-name').value;
            const price = parseFloat(document.getElementById('edit-prod-price').value);

            if (id) {
                // Editar
                const prodIndex = db.products.findIndex(p => p.id === id);
                if (prodIndex !== -1) {
                    db.products[prodIndex] = { id, icon, name, price };
                    showToast('Producto actualizado');
                }
            } else {
                // Nuevo
                const newId = 'p_' + Date.now();
                db.products.push({ id: newId, icon, name, price });
                showToast('Producto creado');
            }
            
            saveDb();
            populateProducts(); // Actualizar el select
            closeModal();
            renderAdminProductos();
        }

        function handleDeleteProduct() {
            const id = document.getElementById('edit-prod-id').value;
            if (id) {
                // Se removió confirm() nativo por restricciones de iframe
                db.products = db.products.filter(p => p.id !== id);
                saveDb();
                populateProducts();
                closeModal();
                showToast('Producto eliminado');
                renderAdminProductos();
            }
        }

        // Exportar funciones globales para HTML inline event handlers
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.handleRegister = handleRegister;
        window.openUserDashboard = openUserDashboard;
        window.goBackHome = goBackHome;
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.handleConfirmPurchase = handleConfirmPurchase;
        window.handleAdminAuth = handleAdminAuth;
        window.exitAdmin = exitAdmin;
        window.switchAdminTab = switchAdminTab;
        window.openAbonoModal = openAbonoModal;
        window.handleAdminAbono = handleAdminAbono;
        window.openProductModal = openProductModal;
        window.handleSaveProduct = handleSaveProduct;
        window.handleDeleteProduct = handleDeleteProduct;

        // Arrancar
        window.onload = init;

    </script>
</body>
</html>
